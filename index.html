<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Android Developer Portfolio - 이의태</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d;
            --bg-2: #0e1018;
            --bg-card: #12141c;
            --bg-card-hover: #181b26;
            --gold: #c9a96e;
            --gold-2: #dfc08a;
            --gold-3: #f0d9a8;
            --champagne: #e8d5b7;
            --accent: #c9a96e;
            --gradient-gold: linear-gradient(135deg, #c9a96e, #dfc08a, #f0d9a8);
            --gradient-dark: linear-gradient(180deg, #08090d, #0e1018);
            --text: #eae6e0;
            --text-2: #9a958d;
            --text-3: #5a564f;
            --border: rgba(201, 169, 110, 0.08);
            --border-hover: rgba(201, 169, 110, 0.25);
            --glow: 0 8px 40px rgba(201, 169, 110, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
            font-size: 16px;
        }

        /* Particle canvas */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(201, 169, 110, 0.2); border-radius: 2px; }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(8, 9, 13, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(201, 169, 110, 0.06);
            animation: fadeDown 0.8s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .logo:hover { opacity: 0.8; }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 48px;
        }

        .nav-link {
            color: var(--text-3);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s;
            cursor: pointer;
            position: relative;
        }

        .nav-link:hover { color: var(--gold); }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 0;
            width: 0; height: 1px;
            background: var(--gold);
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .nav-link:hover::after { width: 100%; }

        .nav-back {
            color: var(--text-2);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .nav-back:hover { color: var(--gold); }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 70% 30%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(201, 169, 110, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Decorative line */
        .hero::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 80px;
            width: 1px;
            height: 200px;
            transform: translateY(-50%);
            background: linear-gradient(180deg, transparent, rgba(201, 169, 110, 0.15), transparent);
            pointer-events: none;
        }

        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .hero-left {
            position: relative;
            z-index: 1;
        }

        .hero-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s both;
        }

        .hero-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(52px, 7vw, 96px);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
        }

        .hero-name-en {
            font-family: 'Playfair Display', serif;
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 400;
            font-style: italic;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.7s both;
        }

        .hero-role {
            font-size: 18px;
            font-weight: 300;
            color: var(--text-2);
            line-height: 1.9;
            max-width: 480px;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.9s both;
        }

        .hero-stats {
            display: flex;
            gap: 56px;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.1s both;
        }

        .h-stat {
            position: relative;
            padding-left: 20px;
        }

        .h-stat::before {
            content: '';
            position: absolute;
            left: 0; top: 4px;
            width: 2px;
            height: calc(100% - 8px);
            background: var(--gradient-gold);
        }

        .h-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1.1;
        }

        .h-stat-label {
            font-size: 11px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 6px;
        }

        /* Hero right - decorative */
        .hero-right {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            opacity: 0;
            animation: fadeUp 1s ease 0.8s both;
        }

        .hero-ornament {
            width: 360px;
            height: 360px;
            position: relative;
        }

        .hero-ornament-ring {
            position: absolute;
            border: 1px solid rgba(201, 169, 110, 0.08);
            border-radius: 50%;
            animation: ringRotate 30s linear infinite;
        }

        .hero-ornament-ring:nth-child(1) {
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .hero-ornament-ring:nth-child(2) {
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            animation-direction: reverse;
            animation-duration: 25s;
            border-color: rgba(201, 169, 110, 0.05);
        }
        .hero-ornament-ring:nth-child(3) {
            top: 60px; left: 60px; right: 60px; bottom: 60px;
            animation-duration: 20s;
            border-color: rgba(201, 169, 110, 0.04);
        }

        .hero-ornament-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 800;
            color: rgba(201, 169, 110, 0.06);
            letter-spacing: -4px;
            white-space: nowrap;
        }

        .hero-ornament-dot {
            position: absolute;
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.4);
        }

        .hero-ornament-dot:nth-child(5) { top: 0; left: 50%; transform: translateX(-50%); }
        .hero-ornament-dot:nth-child(6) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .hero-ornament-dot:nth-child(7) { top: 50%; left: 0; transform: translateY(-50%); }
        .hero-ornament-dot:nth-child(8) { top: 50%; right: 0; transform: translateY(-50%); }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== SECTIONS ===== */
        .section {
            padding: 120px 0;
            position: relative;
        }

        .section-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .section-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: end;
            margin-bottom: 80px;
        }

        .section-header-full {
            margin-bottom: 80px;
        }

        .section-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 4vw, 56px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }

        .section-desc {
            font-size: 16px;
            color: var(--text-2);
            line-height: 1.9;
            max-width: 480px;
            align-self: end;
        }

        /* Horizontal divider with ornament */
        .section-divider {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .section-divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.1), transparent);
        }

        .section-divider-diamond {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: 0.3;
        }

        /* ===== PROJECT CARDS - HORIZONTAL LAYOUT ===== */
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .project-card {
            display: grid;
            grid-template-columns: 140px 1fr;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--gradient-gold);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .project-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateX(8px);
            box-shadow: var(--glow);
        }

        .project-card:hover::before { opacity: 1; }
        .project-card:active { transform: translateX(4px) scale(0.995); }

        .project-card-left {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            position: relative;
        }

        .project-card-left::after {
            content: '';
            position: absolute;
            right: 0; top: 24px; bottom: 24px;
            width: 1px;
            background: var(--border);
        }

        .project-card-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            object-fit: contain;
        }

        .project-card-body {
            padding: 32px 36px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .project-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .project-card-period {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 1px;
            white-space: nowrap;
            padding: 5px 14px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-radius: 4px;
            flex-shrink: 0;
        }

        .project-card-role {
            font-size: 13px;
            color: var(--gold-2);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .project-card-desc {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.8;
        }

        .project-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .project-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .project-card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-3);
            background: rgba(201, 169, 110, 0.04);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(201, 169, 110, 0.06);
            transition: all 0.3s;
        }

        .project-card:hover .project-card-tag {
            border-color: rgba(201, 169, 110, 0.12);
            color: var(--text-2);
        }

        .project-card-metrics {
            display: flex;
            gap: 24px;
            flex-shrink: 0;
        }

        .project-card-metric {
            text-align: right;
        }

        .project-card-metric-value {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
        }

        .project-card-metric-label {
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .project-card-arrow {
            position: absolute;
            right: 36px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 18px;
            opacity: 0;
            transition: all 0.4s;
        }

        .project-card:hover .project-card-arrow {
            opacity: 1;
            right: 28px;
            color: var(--gold);
        }

        /* ===== SKILLS - MASONRY STYLE ===== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        .skill-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: var(--gradient-gold);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .skill-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: var(--glow);
        }

        .skill-card:hover::after { opacity: 1; }

        .skill-name {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skill-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .skill-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-2);
            background: rgba(201, 169, 110, 0.04);
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(201, 169, 110, 0.06);
            transition: all 0.3s;
        }

        .skill-badge:hover {
            border-color: rgba(201, 169, 110, 0.2);
            color: var(--gold);
            background: rgba(201, 169, 110, 0.06);
            transform: translateY(-2px);
        }

        /* ===== CONTACT - ELEGANT ===== */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
        }

        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.06), transparent);
            border-radius: 50%;
            transition: all 0.6s;
            transform: translate(-50%, -50%);
        }

        .contact-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-hover);
            box-shadow: var(--glow);
        }

        .contact-card:hover::before {
            width: 300px;
            height: 300px;
        }

        .contact-emoji {
            font-size: 36px;
            margin-bottom: 24px;
            display: block;
            position: relative;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .contact-card:hover .contact-emoji {
            transform: scale(1.15);
        }

        .contact-type {
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .contact-info {
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid rgba(201, 169, 110, 0.06);
            padding: 48px 0;
            text-align: center;
        }

        .footer-text {
            font-size: 12px;
            color: var(--text-3);
            letter-spacing: 2px;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeLeft {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeRight {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes goldGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(201, 169, 110, 0.1); }
            50% { text-shadow: 0 0 40px rgba(201, 169, 110, 0.3), 0 0 80px rgba(201, 169, 110, 0.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(201, 169, 110, 0.08); }
            50% { border-color: rgba(201, 169, 110, 0.2); }
        }

        @keyframes lineExpand {
            from { width: 0; opacity: 0; }
            to { width: 100%; opacity: 1; }
        }

        @keyframes dotScale {
            0%, 100% { transform: rotate(45deg) scale(1); opacity: 0.3; }
            50% { transform: rotate(45deg) scale(1.4); opacity: 0.6; }
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes cursorBlink {
            0%, 100% { border-color: var(--gold); }
            50% { border-color: transparent; }
        }

        @keyframes revealUp {
            from { clip-path: inset(100% 0 0 0); opacity: 0; }
            to { clip-path: inset(0 0 0 0); opacity: 1; }
        }

        @keyframes particle {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 1; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0); }
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes diamondFloat {
            0%, 100% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(-4px); }
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.04; }
            50% { opacity: 0.08; }
        }

        /* ===== GLOBAL ANIMATIONS ===== */

        /* Background breathing ambient light */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 70% 20%, rgba(201, 169, 110, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(201, 169, 110, 0.03) 0%, transparent 50%);
            animation: breathe 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        #root { position: relative; z-index: 1; }

        /* Scroll fade-in with stagger */
        .fade-in {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== NAV ANIMATIONS ===== */
        nav {
            animation: fadeDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
        }

        .logo {
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .logo:hover {
            text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
            letter-spacing: 3px;
        }

        .nav-link {
            transition: all 0.3s;
        }

        .nav-link::after {
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ===== HERO ANIMATIONS ===== */
        .hero-tag {
            animation: fadeRight 0.8s ease 0.3s both;
            position: relative;
        }

        .hero-tag::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--gold);
            margin-left: 6px;
            vertical-align: middle;
            animation: cursorBlink 1s step-end infinite;
        }

        .hero-name {
            animation: revealUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
        }

        .hero-name-en {
            animation: fadeRight 1s ease 0.8s both;
        }

        .hero-role {
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1s both;
        }

        .hero-stats {
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.3s both;
        }

        /* Stat golden glow */
        .h-stat-value {
            animation: goldGlow 4s ease-in-out infinite;
            transition: all 0.4s;
        }

        .h-stat {
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .h-stat:hover {
            transform: translateY(-6px);
        }

        .h-stat:hover .h-stat-value {
            text-shadow: 0 0 40px rgba(201, 169, 110, 0.5), 0 0 80px rgba(201, 169, 110, 0.2);
        }

        .h-stat::before {
            transition: all 0.4s;
        }

        .h-stat:hover::before {
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.3);
        }

        /* Ornament animations */
        .hero-right {
            animation: scaleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
        }

        .hero-ornament-ring {
            animation: ringRotate 30s linear infinite;
        }

        .hero-ornament-ring:nth-child(1) {
            animation: ringRotate 30s linear infinite, borderGlow 4s ease-in-out infinite;
        }

        .hero-ornament-ring:nth-child(2) {
            animation: ringRotate 25s linear infinite reverse, borderGlow 4s ease-in-out 1s infinite;
        }

        .hero-ornament-ring:nth-child(3) {
            animation: ringRotate 20s linear infinite, borderGlow 4s ease-in-out 2s infinite;
        }

        .hero-ornament-dot {
            animation: dotScale 3s ease-in-out infinite;
        }

        .hero-ornament-dot:nth-child(5) { animation-delay: 0s; }
        .hero-ornament-dot:nth-child(6) { animation-delay: 0.75s; }
        .hero-ornament-dot:nth-child(7) { animation-delay: 1.5s; }
        .hero-ornament-dot:nth-child(8) { animation-delay: 2.25s; }

        .hero-ornament-center {
            animation: goldGlow 5s ease-in-out infinite;
        }

        /* Hero decorative vertical line */
        .hero::after {
            animation: lineExpand 1.5s ease 1.5s both;
            width: 1px;
        }

        /* ===== SECTION HEADER ANIMATIONS ===== */
        .section-tag {
            position: relative;
            display: inline-block;
        }

        .section-tag::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--gradient-gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .fade-in.visible .section-tag::before {
            transform: scaleX(1);
        }

        .section-title {
            position: relative;
        }

        /* Section divider diamond animation */
        .section-divider-diamond {
            animation: diamondFloat 3s ease-in-out infinite;
        }

        .section-divider-line {
            position: relative;
            overflow: hidden;
        }

        .section-divider-line::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.4), transparent);
            animation: shimmer 5s ease-in-out infinite;
        }

        /* ===== PROJECT CARD ANIMATIONS ===== */
        .project-card {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .project-card::before {
            transition: opacity 0.5s, box-shadow 0.5s;
        }

        .project-card:hover::before {
            opacity: 1;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.1);
        }

        .project-card:hover {
            box-shadow: 0 16px 60px rgba(201, 169, 110, 0.06), 0 0 0 1px rgba(201, 169, 110, 0.08);
        }

        /* Icon hover glow */
        .project-card-icon {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .project-card:hover .project-card-icon {
            transform: scale(1.08);
            filter: drop-shadow(0 0 12px rgba(201, 169, 110, 0.2));
        }

        /* Title shimmer on hover */
        .project-card-title {
            transition: color 0.4s;
        }

        .project-card:hover .project-card-title {
            background: linear-gradient(90deg, var(--text), var(--gold), var(--text));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        /* Period badge glow */
        .project-card-period {
            transition: all 0.4s;
        }

        .project-card:hover .project-card-period {
            border-color: rgba(201, 169, 110, 0.4);
            box-shadow: 0 0 16px rgba(201, 169, 110, 0.08);
        }

        /* Tag stagger reveal on hover */
        .project-card-tag {
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .project-card:hover .project-card-tag {
            border-color: rgba(201, 169, 110, 0.15);
            color: var(--gold-2);
            background: rgba(201, 169, 110, 0.06);
        }

        .project-card:hover .project-card-tag:nth-child(1) { transition-delay: 0s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(2) { transition-delay: 0.03s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(3) { transition-delay: 0.06s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(4) { transition-delay: 0.09s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(5) { transition-delay: 0.12s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(6) { transition-delay: 0.15s; transform: translateY(-2px); }
        .project-card:hover .project-card-tag:nth-child(7) { transition-delay: 0.18s; transform: translateY(-2px); }

        /* Metric value glow on hover */
        .project-card-metric-value {
            transition: all 0.4s;
        }

        .project-card:hover .project-card-metric-value {
            text-shadow: 0 0 16px rgba(201, 169, 110, 0.3);
        }

        /* Arrow reveal */
        .project-card-arrow {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .project-card:hover .project-card-arrow {
            opacity: 1;
            right: 28px;
            color: var(--gold);
            text-shadow: 0 0 12px rgba(201, 169, 110, 0.3);
        }

        /* ===== SKILL CARD ANIMATIONS ===== */
        .skill-card {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .skill-card::after {
            transition: opacity 0.5s, box-shadow 0.5s;
        }

        .skill-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(201, 169, 110, 0.06);
        }

        .skill-card:hover::after {
            opacity: 1;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.1);
        }

        /* Skill dot rotation */
        .skill-dot {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .skill-card:hover .skill-dot {
            transform: rotate(135deg) scale(1.3);
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.4);
        }

        /* Skill name shimmer */
        .skill-name {
            transition: color 0.3s;
        }

        .skill-card:hover .skill-name {
            color: var(--gold);
        }

        /* Badge hover cascade */
        .skill-badge {
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .skill-badge:hover {
            border-color: rgba(201, 169, 110, 0.3);
            color: var(--gold);
            background: rgba(201, 169, 110, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(201, 169, 110, 0.08);
        }

        /* ===== CONTACT CARD ANIMATIONS ===== */
        .contact-card {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .contact-card::before {
            transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .contact-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-hover);
            box-shadow: 0 20px 60px rgba(201, 169, 110, 0.06);
        }

        .contact-card:hover::before {
            width: 350px;
            height: 350px;
        }

        .contact-emoji {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .contact-card:hover .contact-emoji {
            transform: scale(1.2) translateY(-6px);
            filter: drop-shadow(0 8px 16px rgba(201, 169, 110, 0.15));
        }

        .contact-info {
            transition: color 0.3s;
        }

        .contact-card:hover .contact-info {
            color: var(--gold);
        }

        /* ===== FOOTER ===== */
        .footer-text {
            transition: color 0.3s;
        }

        .footer-text:hover {
            color: var(--gold);
        }

        /* ===== DETAIL PAGE ANIMATIONS ===== */

        /* ===== DETAIL PAGE ===== */
        .detail-page {
            min-height: 100vh;
            padding-bottom: 80px;
            animation: fadeUp 0.5s ease both;
        }

        .detail-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-2);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px 0;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .detail-back:hover { color: var(--gold); }

        .detail-hero {
            padding: 130px 0 80px;
            position: relative;
            overflow: hidden;
        }
        .detail-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.08;
            z-index: 0;
        }
        .detail-hero .section-container { position: relative; z-index: 1; }

        .detail-hero-top {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 60px;
            margin-top: 32px;
            align-items: start;
        }

        .detail-phone {
            flex-shrink: 0;
            width: 240px;
            height: 480px;
            border-radius: 36px;
            border: 2px solid rgba(201, 169, 110, 0.15);
            background: #0e1018;
            position: relative;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: phoneFadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .detail-phone:hover {
            border-color: rgba(201, 169, 110, 0.3);
            box-shadow: 0 30px 100px rgba(0,0,0,0.6), 0 0 40px rgba(201, 169, 110, 0.06);
            transform: translateY(-4px);
        }

        @keyframes phoneFadeIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.92) rotateY(-8deg); }
            60% { transform: translateY(-4px) scale(1.01) rotateY(1deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotateY(0); }
        }

        .detail-phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 28px;
            background: #0e1018;
            border-radius: 0 0 18px 18px;
            z-index: 2;
        }
        .detail-phone-screen {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            overflow: hidden;
        }
        .detail-phone-icon { font-size: 56px; z-index: 1; }
        .detail-phone-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-align: center;
            padding: 0 16px;
            z-index: 1;
        }
        .detail-phone-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 50%);
        }

        .detail-hero-info {
            padding-top: 12px;
            animation: detailInfoSlide 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
        }

        @keyframes detailInfoSlide {
            0% { opacity: 0; transform: translateX(50px); filter: blur(4px); }
            100% { opacity: 1; transform: translateX(0); filter: blur(0); }
        }

        .detail-hero-icon-img {
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .detail-hero-icon-img:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.15);
        }

        .detail-hero-title {
            animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
        }

        .detail-hero-meta {
            animation: fadeUp 0.8s ease 0.9s both;
        }

        .detail-hero-desc {
            animation: fadeUp 0.8s ease 1.1s both;
        }

        .detail-hero-icon-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        .detail-hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .detail-hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }
        .detail-hero-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-2);
        }
        .detail-hero-desc {
            font-size: 16px;
            line-height: 1.9;
            color: var(--text-2);
            max-width: 560px;
        }

        .detail-section {
            padding: 60px 0;
        }
        .detail-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .detail-section-dot {
            width: 8px;
            height: 8px;
            transform: rotate(45deg);
        }

        .detail-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .detail-overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            text-align: center;
            transition: all 0.3s;
        }
        .detail-overview-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
        }
        .detail-overview-value {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .detail-overview-label {
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-highlights {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .detail-highlight-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .detail-highlight-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 0;
            background: rgba(201, 169, 110, 0.03);
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .detail-highlight-card:hover {
            transform: translateX(8px);
            border-color: var(--border-hover);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.04);
        }
        .detail-highlight-card:hover::after {
            width: 100%;
        }
        .detail-highlight-num {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .detail-highlight-card:hover .detail-highlight-num {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .detail-highlight-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
            position: relative;
            z-index: 1;
        }

        .detail-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detail-tech-badge {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid;
            background: rgba(201, 169, 110, 0.03);
            transition: all 0.3s;
        }
        .detail-tech-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(201, 169, 110, 0.08);
        }

        .detail-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .detail-metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .detail-metric-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.04) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .detail-metric-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-hover);
            box-shadow: 0 16px 50px rgba(201, 169, 110, 0.08);
        }
        .detail-metric-card:hover::before {
            opacity: 1;
        }
        .detail-metric-value {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            transition: all 0.4s;
        }
        .detail-metric-card:hover .detail-metric-value {
            text-shadow: 0 0 20px currentColor;
            transform: scale(1.05);
        }
        .detail-metric-label {
            font-size: 13px;
            color: var(--text-3);
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .detail-gallery {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .detail-gallery::-webkit-scrollbar { height: 3px; }
        .detail-gallery::-webkit-scrollbar-track { background: transparent; }
        .detail-gallery::-webkit-scrollbar-thumb { background: rgba(201, 169, 110, 0.2); border-radius: 2px; }
        .detail-gallery-item {
            flex-shrink: 0;
            width: 140px;
            height: 240px;
            border-radius: 14px;
            border: 2px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .detail-gallery-item:hover {
            transform: scale(1.06) translateY(-4px);
            border-color: rgba(201, 169, 110, 0.4);
            box-shadow: 0 16px 40px rgba(201, 169, 110, 0.1);
        }
        .detail-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .nav-inner, .section-container { padding: 0 40px; }
            .hero-container { grid-template-columns: 1fr; gap: 60px; padding: 0 40px; }
            .hero-right { display: none; }
            .section-header { grid-template-columns: 1fr; gap: 20px; }
            .project-card { grid-template-columns: 100px 1fr; }
            .detail-hero-top { grid-template-columns: 200px 1fr; gap: 40px; }
            .detail-overview { grid-template-columns: repeat(2, 1fr); }
            .detail-highlights { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-inner, .section-container { padding: 0 24px; }
            .hero-container { padding: 0 24px; }
            .hero { min-height: auto; padding: 120px 0 80px; }
            .hero-stats { flex-wrap: wrap; gap: 32px; }
            .h-stat-value { font-size: 36px; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
            .contact-grid { grid-template-columns: 1fr; max-width: 360px; }
            .section { padding: 80px 0; }
            .project-card { grid-template-columns: 1fr; }

<script>
// Floating gold particles
(function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight * 3;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = -(Math.random() * 0.3 + 0.1);
            this.opacity = Math.random() * 0.3 + 0.05;
            this.fadeSpeed = Math.random() * 0.003 + 0.001;
            this.growing = Math.random() > 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.growing) {
                this.opacity += this.fadeSpeed;
                if (this.opacity >= 0.35) this.growing = false;
            } else {
                this.opacity -= this.fadeSpeed;
                if (this.opacity <= 0.02) this.reset();
            }
            if (this.y < -10 || this.x < -10 || this.x > w + 10) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201, 169, 110, ${this.opacity})`;
            ctx.fill();
            // Glow
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201, 169, 110, ${this.opacity * 0.15})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>
